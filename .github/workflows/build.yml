name: build

# Build the engine image and publish it to GHCR under two tags:
#
#   ghcr.io/opendera/pipeline-manager:latest   (control plane on Fly)
#   ghcr.io/opendera/compiler:latest           (compile-pool on Fly)
#
# Both Fly apps consume the same image; the entrypoint behavior is
# selected at runtime via OPENDERA_SERVICE_MODE in each fly.toml.
#
# deploy/Dockerfile.cloud is a multi-stage build:
#   1. cargo-chef cooks the dep graph in its own cached layer
#   2. Maven builds the SQL compiler jar in a parallel stage
#   3. cargo builds the pipeline-manager binary against the cached deps
#   4. ubuntu+JRE runtime is assembled with just the two artifacts
#
# Buildx --cache-from/--cache-to=type=gha persists those layers across
# runs, so warm builds with no Cargo.lock change land in 1–3 min.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: |
            ghcr.io/opendera/pipeline-manager
            ghcr.io/opendera/compiler
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.cloud
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # linux/amd64 only — Fly runs amd64 anyway. Multi-arch builds
          # would double our CI time for no runtime benefit.
          platforms: linux/amd64
          cache-from: type=gha,scope=engine
          cache-to: type=gha,scope=engine,mode=max
