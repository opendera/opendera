name: build

# Build the engine image and publish it to GHCR under two tags:
#
#   ghcr.io/opendera/pipeline-manager:latest   (control plane on Fly)
#   ghcr.io/opendera/compiler:latest           (compile-pool on Fly)
#
# Both Fly apps consume the same image today; the entrypoint differs in
# each fly.toml. If they diverge later, split into two build steps.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: |
            ghcr.io/opendera/pipeline-manager
            ghcr.io/opendera/compiler
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=engine
          cache-to: type=gha,scope=engine,mode=max
